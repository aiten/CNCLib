<div class="container-fluid nopadding">
  @for (item of machineControlState.serialServer.getMachine().commands; track item) {
    <div class="row nopadding">
      <button mat-stroked-button class="custom-button" (click)='machineControlState.postcommand(item.commandString)'>{{item.commandName}}</button>
    </div>
  }
</div>
