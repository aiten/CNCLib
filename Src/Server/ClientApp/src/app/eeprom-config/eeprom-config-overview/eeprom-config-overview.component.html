<div class="container">

  <h3>Calculation of Eeprom parameters for CNC machines</h3>

  <div class="row">
    <div class="col-sm">
      <h1>Input</h1>
      <eeprom-config-form #eeinput [eepromConfigInput]="eepromConfigInput">
        Loading ...
      </eeprom-config-form>
      <button mat-stroked-button [disabled]="!eeinput.isValid()" (click)="eeinput.getFormValues(); calculateEepromConfig()">Calculate eeprom values</button>
    </div>
    <div class="col-sm">
      @if (isCalculated) {
        <div>
          <h1>Result</h1>
          @if (isCalculating) {
            <p>Calculating ...</p>
          }
          @if (isCalculated) {
            <eeprom-config-result [entry]="eepromConfig">
              Loading ...
            </eeprom-config-result>
          }
        </div>
      }
    </div>
  </div>
</div>
